<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Species Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .container { padding-top: 50px; }
        .card { border: none; border-radius: 15px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .btn-predict { background-color: #00796b; color: white; border: none; padding: 10px; font-weight: bold; }
        .btn-predict:hover { background-color: #004d40; color: white; }
        .result-area { display: none; margin-top: 20px; border-radius: 10px; transition: all 0.3s ease; }
        .species-badge { font-size: 1.5rem; font-weight: bold; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg p-4">
                <div class="text-center mb-4">
                    <h2 class="text-dark">🌸 Iris Classifier</h2>
                    <p class="text-muted">Enter measurements in centimeters (cm)</p>
                </div>

                <form id="irisForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Sepal Length</label>
                            <input type="number" step="0.1" name="sl" class="form-control" placeholder="5.1" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Sepal Width</label>
                            <input type="number" step="0.1" name="sw" class="form-control" placeholder="3.5" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Petal Length</label>
                            <input type="number" step="0.1" name="pl" class="form-control" placeholder="1.4" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Petal Width</label>
                            <input type="number" step="0.1" name="pw" class="form-control" placeholder="0.2" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-predict w-100 mt-2 shadow-sm">Predict Species</button>
                </form>

                <div id="resultArea" class="result-area p-3 text-center">
                    <span class="text-uppercase small fw-bold">Predicted Species:</span>
                    <span id="speciesName" class="species-badge"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('irisForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        // Prepare payload for Flask
        const features = [
            parseFloat(formData.get('sl')),
            parseFloat(formData.get('sw')),
            parseFloat(formData.get('pl')),
            parseFloat(formData.get('pw'))
        ];

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ features: [features] }) // Wrap in list as ML models expect 2D arrays
            });
            
            const data = await response.json();
            const resultArea = document.getElementById('resultArea');
            const speciesName = document.getElementById('speciesName');

            // Handle UI feedback
            resultArea.style.display = 'block';
            resultArea.className = 'result-area p-3 text-center bg-light border border-teal';
            speciesName.innerText = data.result;
            speciesName.style.color = '#00796b';

        } catch (error) {
            console.error("Error:", error);
            alert("Ensure your Flask server is running at port 5000.");
        }
    };
</script>

</body>
</html>
