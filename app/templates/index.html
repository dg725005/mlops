<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dropout Predictor | MLOps Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section { background: #003566; color: white; padding: 40px 0; margin-bottom: 30px; }
        .card { border: none; border-radius: 12px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .result-box { display: none; border-radius: 10px; padding: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="hero-section text-center">
    <h1>🎓 Student Success AI</h1>
    <p>Real-time Dropout Risk Assessment powered by MLflow & DVC</p>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                <div class="card-body p-4">
                    <h4 class="card-title mb-4">Predictor Inputs</h4>
                    <form id="predictionForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Attendance Rate (%)</label>
                                <input type="number" step="0.1" name="attendance" class="form-control" placeholder="e.g. 92.5" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Previous Semester Grade</label>
                                <input type="number" step="0.1" name="grades" class="form-control" placeholder="e.g. 78.0" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-3 py-2 fw-bold">Run AI Analysis</button>
                    </form>
                </div>
            </div>

            <div id="resultBox" class="result-box shadow-sm">
                <h2 id="resultText"></h2>
                <p id="resultSubtext" class="mb-0"></p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('predictionForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const resultBox = document.getElementById('resultBox');
        const resultText = document.getElementById('resultText');
        
        // Convert form to JSON features list for the API
        const features = [
            parseFloat(formData.get('attendance')),
            parseFloat(formData.get('grades')),
            parseFloat(formData.get('study_hours')),
            parseFloat(formData.get('involvement'))
        ];

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ features: features })
            });
            
            const data = await response.json();
            
            resultBox.style.display = 'block';
            if (data.result === 1) {
                resultBox.className = 'result-box shadow-sm bg-danger text-white';
                resultText.innerText = "🚨 HIGH RISK OF DROPOUT";
            } else {
                resultBox.className = 'result-box shadow-sm bg-success text-white';
                resultText.innerText = "✅ LOW RISK / GRADUATE";
            }
        } catch (error) {
            alert("API Error: Make sure your Flask backend is running.");
        }
    };
</script>

</body>
</html>
